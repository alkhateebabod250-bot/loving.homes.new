<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحزم المخصصة - Loving Homes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="settings-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3 data-i18n="settings">الإعدادات</h3>
            <button id="close-sidebar">×</button>
        </div>
        <div class="setting-item">
            <span data-i18n="darkMode">الوضع الداكن</span>
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span data-i18n="fontSize">حجم الخط</span>
            <div class="setting-controls">
                <button class="setting-btn" id="font-decrease">A-</button>
                <button class="setting-btn" id="font-increase">A+</button>
            </div>
        </div>
        <div class="setting-item">
            <span data-i18n="language">اللغة</span>
            <button class="setting-btn" id="lang-toggle">عربي</button>
        </div>
    </div>
    <div id="sidebar-overlay" class="overlay"></div>

    <header class="main-header">
        <img src="images/settings.png" alt="Settings" class="settings-img" id="open-settings">
        <div class="header-center">
            <img src="images/paw.png" alt="Paw" class="paw-img">
            <h1>Loving Homes</h1>
        </div>
        <img src="images/logo.png" alt="logo" class="logo-full-height">
    </header>

    <nav class="navbar">
        <button class="nav-button" data-i18n="home">الصفحة الرئيسية</button>
        <button class="nav-button" data-i18n="facilities">المرافق المقدمة</button>
        <button class="nav-button" data-i18n="packages">الحزم المقدمة</button>
        <button class="nav-button" data-i18n="contact">اتصل بنا</button>
    </nav>

    <div class="packages-list">
        <div class="package-sticker">
            <p><strong data-i18n="customPackages">حزم مخصصة</strong><span data-i18n="customPackagesDesc">نوفر حزمًا مخصصة تناسب الإقامات الطويلة أو الكلاب التي تحتاج إلى رعاية إضافية. يتم تصميم هذه الحزم حسب احتياجات العميل وحالة الكلب الصحية أو السلوكية. يرجى التواصل معنا لترتيب تفاصيل الحزمة المخصصة.</span></p>
        </div>
    </div>

    <div class="footer-action">
        <button class="other-facilities-btn" id="go-to-contact" data-i18n="contact">اتصل بنا</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
